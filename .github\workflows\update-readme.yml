name: Update README Changelog

on:
  push:
    branches: [main, master]

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 20

      - name: Generate changelog and update README
        run: |
          python3 << 'EOF'
          import subprocess, re
          from datetime import datetime, timezone, timedelta

          gmt7 = timezone(timedelta(hours=7))

          # Get last 20 commits: hash, date (ISO), message
          log = subprocess.check_output([
              "git", "log", "--pretty=format:%H|%aI|%s", "-20"
          ]).decode().strip()

          rows = []
          for line in log.splitlines():
              parts = line.split("|", 2)
              if len(parts) < 3:
                  continue
              sha, dt_str, msg = parts
              sha = sha[:7]
              dt = datetime.fromisoformat(dt_str).astimezone(gmt7)
              date = dt.strftime("%Y-%m-%d %H:%M GMT+7")
              rows.append(f"| {date} | `{sha}` | {msg} |")

          table = (
              "## 📋 Commit Log\n\n"
              "| Date (GMT+7) | SHA | Message |\n"
              "|---|---|---|\n"
              + "\n".join(rows)
              + "\n"
          )

          readme = open("README.md").read()

          # Replace existing section or append
          marker = "## 📋 Commit Log"
          if marker in readme:
              readme = re.sub(r"## 📋 Commit Log.*", table, readme, flags=re.DOTALL)
          else:
              readme = readme.rstrip() + "\n\n" + table

          open("README.md", "w").write(readme)
          print("README updated.")
          EOF

      - name: Commit updated README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet || git commit -m "chore: update commit log in README [skip ci]"
          git push
